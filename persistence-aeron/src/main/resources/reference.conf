# Default configuration for Aeron persistence module.
# Override these values in your application.conf.

persistence {
  # store-type = "aeron"  # Uncomment to enable Aeron persistence
  # base-path = "./data/local-cache"

  aeron {
    media-driver {
      embedded = true
      aeron-dir = ""
    }

    publisher-id = 1

    subscribers = []

    local-endpoint {
      host = "0.0.0.0"
      replay-port = 40458
    }

    replay {
      timeout-ms = 30000
      max-batch-size = 10000
    }

    heartbeat-interval-ms = 1000
    idle-strategy = "sleeping"
  }
}

aeron-remote-store {
  base-path = "./data/remote-store"

  aeron {
    media-driver {
      embedded = true
      aeron-dir = ""
    }

    listen {
      host = "0.0.0.0"
      data-port = 40456
      control-port = 40457
    }

    engines = []

    idle-strategy = "sleeping"
    fragment-limit = 256
  }
}
