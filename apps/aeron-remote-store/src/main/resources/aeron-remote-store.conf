# =============================================================================
# Aeron Remote Persistence Store Configuration
# =============================================================================
# This HOCON file configures the standalone Aeron remote store process that
# receives replicated log entries from FIX/OUCH engine publishers via Aeron.
# =============================================================================

aeron-remote-store {
    # Base directory for Chronicle Queue log files
    base-path = "./data/remote-store"

    aeron {
        media-driver {
            # Use embedded media driver (true) or connect to external (false)
            embedded = true
            # Aeron directory - leave empty for auto-generated temp dir
            aeron-dir = ""
        }

        listen {
            # Host to bind for receiving replicated data
            host = "0.0.0.0"
            # UDP data port for Aeron subscription
            data-port = 40456
            # UDP control port for Aeron MDC (multi-destination-cast)
            control-port = 40457
        }

        # Engine publishers that replicate to this store
        engines = [
            {
                name = "engine-1"
                host = "localhost"
                replay-port = 40458
                publisher-id = 1
            }
        ]

        # Idle strategy: sleeping, yielding, spinning, backoff
        idle-strategy = "sleeping"
        # Max fragments to process per poll
        fragment-limit = 256
    }
}
